  db:
    image: postgres
    restart: always
    env_file: ./../build_meta/.env_staging
    ports:
      - "5432:5432"
    expose:
      - "5432"
    volumes:
      - ./postgres:/var/lib/postgresql
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    restart: always
    volumes:
      - redis:/data
    command: >
      redis-server --save 20 1 --loglevel warning
    networks:
      - backend

networks:
  backend:


volumes:
  redis:
  postgres:
