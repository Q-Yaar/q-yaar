version: '3'

services:
  q_yaar_core:
    restart: always
    build:
      context: ./../q_yaar_platform
      dockerfile: ./../q_yaar_platform/Dockerfile-staging
    extra_hosts:
      # For ubuntu docker to access host machine services
      - "host.docker.internal:host-gateway"
    env_file: ./../build_meta/.env_staging
    ports:
      - "8000:8000"
    networks:
      - backend
    command: >
      bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  fast_worker:
    build:
      context: ./../q_yaar_platform
      dockerfile: ./../q_yaar_platform/Dockerfile-staging
    command: celery -A q_yaar worker -E -l info --concurrency=8 --pool=prefork -n fast_worker@qyaar.com  -Q example
    env_file: ./../build_meta/.env_staging
    networks:
      - backend

  slow_worker:
    build:
      context: ./../q_yaar_platform
      dockerfile: ./../q_yaar_platform/Dockerfile-staging
    command: celery -A q_yaar worker -E -l info --concurrency=8 --pool=prefork -n slow_worker@qyaar.com  -Q default
    env_file: ./../build_meta/.env_staging
    networks:
      - backend

  celery_beat:
    build:
      context: ./../q_yaar_platform
      dockerfile: ./../q_yaar_platform/Dockerfile-staging
    extra_hosts:
      # For ubuntu docker to access host machine services
      - "host.docker.internal:host-gateway"
    command: celery -A q_yaar beat -l debug
    env_file: ./../build_meta/.env_staging
    networks:
      - backend

  db:
    image: postgres
    env_file: ./../build_meta/.env_staging
    ports:
      - "5432:5432"
    expose:
      - "5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql
    networks:
      - backend

  # nginxserver:
  #   restart: always
  #   build:
  #     context: ./../nginx/
  #     dockerfile: ./../nginx/Dockerfile-staging
  #   container_name: nginxserver
  #   ports:
  #     - "80:80"
  #   networks:
  #     - backend
  #   depends_on:
  #     - q_yaar_core

networks:
  backend:


volumes:
  redisdata:
