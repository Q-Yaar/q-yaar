services:
  q_yaar_core:
    restart: always
    build:
      context: ./../q_yaar_platform
      dockerfile: ./../q_yaar_platform/Dockerfile-staging
    extra_hosts:
      # For ubuntu docker to access host machine services
      - "host.docker.internal:host-gateway"
    env_file: ./../build_meta/.env_staging
    ports:
      - "8000:8000"
    networks:
      - backend
    depends_on:
      - db
      - redis
    command: >
      bash -c "python manage.py migrate && gunicorn q_yaar.wsgi:application --bind 0.0.0.0:8000 --workers 5"

