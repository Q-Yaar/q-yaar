version: '3'

services:
  q_yaar_core:
    restart: always
    build:
      context: ./../q_yaar_platform
      dockerfile: ./../q_yaar_platform/Dockerfile-dev
    extra_hosts:
      # For ubuntu docker to access host machine services
      - "host.docker.internal:host-gateway"
    env_file: ./../q_yaar_platform/.env_docker
    ports:
      - "8000:8000"
    networks:
      - backend
    command: >
      bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

