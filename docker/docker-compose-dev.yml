  db:
    image: postgis/postgis:latest
    platform: linux/amd64
    restart: always
    env_file: ./../q_yaar_platform/.env_docker
    ports:
      - "5436:5432"
    expose:
      - "5436"
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - backend

  redisearch:
    image: redislabs/redisearch:latest
    ports:
      - "6380:6380"
    expose:
      - "6380"
    volumes:
      - redisdata:/data
    command: [ "redis-server", "--port", "6380", "--loadmodule", "/usr/lib/redis/modules/redisearch.so", "--appendonly", "yes", "--aof-use-rdb-preamble", "yes" ]
    networks:
      - backend

networks:
  backend:


volumes:
  redisdata:
  dbdata:
